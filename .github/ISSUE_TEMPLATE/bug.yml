name: Bug Report
description: Report a bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — game unplayable
        - Major — feature broken
        - Minor — cosmetic or edge case
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform / Browser
      placeholder: "e.g., iOS Safari 17, Chrome 124 Android"

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots
      description: Drag and drop screenshots if helpful.
